<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q4 2nd Graded Exercise</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 600px;
        background: #ffffff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .stars {
        margin-top: 10px;
        font-size: 24px;
        cursor: pointer;
    }

    .stars span {
        color: #ccc;
        transition: 0.2s;
    }

    .stars span.active {
        color: gold;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        background-color: #1e73d8;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
    }

    button:hover {
        background-color: #155bb5;
    }

    .movie-list {
        margin-top: 30px;
    }

    .movie-item {
        background: #f1f1f1;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .movie-item .stars-display {
        color: gold;
    }

    .delete-btn {
        margin-left: 10px;
        background-color: #dc3545;
        width: auto;
        padding: 3px 8px;
        font-size: 12px;
    }

    .delete-btn:hover {
        background-color: #b02a37;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Add / Update a Movie Rating</h2> 

    <form>
        <label>Title:</label>
        <input type="text" id="title">

        <label>Year:</label>
        <input type="number" id="year">

        <label>Genre:</label>
        <select id="genre">
            <option>Action</option>
            <option>Comedy</option>
            <option>Drama</option>
            <option>Horror</option>
            <option>Romance</option>
            <option>Sci-Fi</option>
            <option>Fantasy</option>
            <option>Thriller</option>
            <option>Western</option>
            <option>Documentary</option>
        </select>

        <label>Rating:</label>
        <div class="stars" id="ratingStars">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
        </div>

        <button type="button" id="addMovieBtn">Add Movie</button>
    </form>

    <div class="movie-list">
        <h2>Movie List</h2>
        <div id="movieContainer"></div>
    </div>

</div>

<script>
let selectedRating = 0;

const stars = document.querySelectorAll("#ratingStars span");
const addMovieBtn = document.getElementById("addMovieBtn");
const movieContainer = document.getElementById("movieContainer");

stars.forEach(star => {
    star.addEventListener("click", function() {
        selectedRating = this.getAttribute("data-value");
        stars.forEach(s => s.classList.remove("active"));
        for (let i = 0; i < selectedRating; i++) {
            stars[i].classList.add("active");
        }
    });
});

window.onload = function() {
    displayMovies();
};

function displayMovies() {
    movieContainer.innerHTML = "";
    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.forEach((movie, index) => { 
        const movieDiv = document.createElement("div");
        movieDiv.classList.add("movie-item");

        let starDisplay = "★".repeat(Math.round(movie.rating)); 

        movieDiv.innerHTML = `
            ${movie.title} (${movie.year}) - ${movie.genre}, Rating:
            <span class="stars-display">${starDisplay}</span>
            <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button> <!-- NEW -->
        `;

        movieContainer.appendChild(movieDiv);
    });
}

function deleteMovie(index) {
    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    let confirmDelete = confirm("Are you sure you want to delete?"); 

    if (confirmDelete) {
        movies.splice(index, 1);
        localStorage.setItem("movies", JSON.stringify(movies));
        displayMovies();
    }
}

addMovieBtn.addEventListener("click", function() {

    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;

    if (!title || !year || selectedRating == 0) {
        alert("Please fill out all fields and select a rating.");
        return;
    }

    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    let existingMovie = movies.find(movie => movie.title.toLowerCase() === title.toLowerCase());

    if (existingMovie) {
        existingMovie.rating = (Number(existingMovie.rating) + Number(selectedRating)) / 2;
        existingMovie.year = year;  
        existingMovie.genre = genre;
    } else {
        const newMovie = {
            title: title,
            year: year,
            genre: genre,
            rating: Number(selectedRating)
        };
        movies.push(newMovie);
    }

    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();

    document.getElementById("title").value = "";
    document.getElementById("year").value = "";
    selectedRating = 0;
    stars.forEach(s => s.classList.remove("active"));
});
</script>

</body>
</html>
